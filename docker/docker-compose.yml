version: "3.9"

services:
  ghost-tunnel:
    image: ghost-tunnel:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ghost-tunnel
    restart: unless-stopped
    environment:
      - ROOT_PASS=${ROOT_PASS:-Kosay378%}
      - NTFY_TOPIC=${NTFY_TOPIC:-temp-mail1}
      - PORTS=${PORTS:-22}
      - BORE_SERVER=${BORE_SERVER:-bore.pub}
      - PORT=${PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Jakarta}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
